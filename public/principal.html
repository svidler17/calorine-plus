<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calorine Plus | Terminal de Acceso</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Fuente -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Iconos -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Tu CSS -->
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

<div class="split-viewport">

    <!-- PANEL IZQUIERDO -->
    <div class="info-panel">
        <div class="brand-center">
            <div class="logo-wrapper">
                <i data-lucide="shield-plus"></i>
            </div>
            <h1>Calorine <span>Plus</span></h1>
            <div class="brand-divider"></div>
            <p class="tagline">SISTEMA INTEGRAL DE GESTIÓN FARMACÉUTICA</p>
        </div>

        <div class="content-bottom">
            <div class="stat-group">
                <div class="stat-item">
                    <span class="label">Versión</span>
                    <span class="value">2.0</span>
                </div>
                <div class="stat-item">
                    <span class="label">Protocolo</span>
                    <span class="value">HTTPS/TLS 1.3</span>
                </div>
            </div>
            <small class="legal">© 2026 Calorine Plus. Todos los derechos reservados.</small>
        </div>
    </div>

    <!-- PANEL DERECHO (LOGIN REAL FUNCIONAL) -->
    <div class="auth-panel">
        <div class="form-wrapper">

            <div class="form-header">
                <h2>Bienvenido/a</h2>
                <p>Ingrese sus credenciales de acceso</p>
            </div>

            <!-- IMPORTANTE: ID loginForm se mantiene -->
            <form id="loginForm">

                <!-- Usuario (documento) -->
                <div class="input-container">
                    <label>Usuario</label>
                    <div class="input-field">
                        <i data-lucide="user"></i>
                        <!-- IMPORTANTE: id="documento" -->
                        <input type="text" id="documento" placeholder="Ingrese su usuario" required>
                    </div>
                </div>

                <!-- Password -->
                <div class="input-container">
                    <label>Contraseña</label>
                    <div class="input-field">
                        <i data-lucide="lock"></i>
                        <!-- IMPORTANTE: id="password" -->
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" class="primary-btn">
                    <span>ENTRAR AL PANEL</span>
                    <i data-lucide="arrow-right"></i>
                </button>

                <!-- IMPORTANTE: id="mensaje" -->
                <p id="mensaje" style="margin-top:10px; color:red;"></p>

            </form>

            <div class="security-note">
                <i data-lucide="lock-keyhole"></i>
                Acceso restringido para personal autorizado.
            </div>

        </div>
    </div>

</div>

<!-- Tu JS real de login -->
<script type="module" src="js/login.js"></script>

<!-- Activar iconos -->
<script>
    lucide.createIcons();
</script>

</body>
</html>
